<!DOCTYPE html>

<head>

    <!-- Sayfa İkonu (Favicon) -->

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- UI Hızlı Yükleme İçin Rubik Font Linki -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- KESİN FONT ÇÖZÜMÜ: Tarayıcı güvenliğini aşmak için Font dosyalarını (binary) indirip Base64 formatında DOM'a kalıcı gömüyoruz -->
    <script>
        async function embedFontsForCanvas() {
            try {
                // 1. Rubik CSS dosyasını çekiyoruz
                const response = await fetch('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
                let cssText = await response.text();
                
                // 2. CSS içindeki font indirme URL'lerini buluyoruz
                const urlRegex = /url\(['"]?(https:\/\/[^'")]+)['"]?\)/g;
                let match;
                const urlMap = {};

                while ((match = urlRegex.exec(cssText)) !== null) {
                    const fontUrl = match[1];
                    if (!urlMap[fontUrl]) {
                        // 3. Font dosyasını gerçekten indirip resimlerin anlayacağı Base64 verisine çeviriyoruz
                        const fontRes = await fetch(fontUrl);
                        const fontBlob = await fontRes.blob();
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.readAsDataURL(fontBlob);
                        });
                        urlMap[fontUrl] = base64;
                    }
                }

                // 4. URL'leri kalıcı verilerle değiştiriyoruz
                for (const [url, base64] of Object.entries(urlMap)) {
                    cssText = cssText.split(url).join(base64);
                }

                // 5. Sayfaya entegre ediyoruz (Artık resim çizerken dışarıya bağlı değiliz!)
                const style = document.createElement('style');
                style.id = 'embedded-base64-fonts';
                style.innerHTML = cssText;
                document.head.appendChild(style);
            } catch (err) {
                console.error("Kesin font gömme işlemi başarısız oldu:", err);
            }
        }
        embedFontsForCanvas();
    </script>

    <!-- Sayfanın Birebir Ekran Görüntüsünü Almak İçin Kütüphane -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <style>
        /* UYGULAMA HİSSİYATI (Mavi seçim alanını kaldırma) */
        * {
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* Standard */
            -webkit-user-drag: none; /* Görsellerin ve linklerin sürüklenmesini engeller */
        }

        /* Sadece veri girilen alanlarda (inputlar ve başlık) metin seçimine izin ver */
        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background-color: #0f1115; /* Koyu tema arka planı */
            color: #ffffff;
            overflow-x: hidden;
            overscroll-behavior-y: none; /* Mobilde aşağı çekerek yenilemeyi engeller */
        }
        
        /* Renklerin canlı kalması için ayarlandı */
        .tier-label {
            color: #000000;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.3);
        }

        /* Özel Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Input type color özelleştirmesi */
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 0.5rem;
        }

        /* Resimleri Silebilmek İçin Kapsayıcı Kutu */
        .draggable-wrapper {
            width: 64px !important;
            height: 64px !important;
            min-width: 64px !important;
            min-height: 64px !important;
            flex-shrink: 0;
            transition: transform 0.1s;
            cursor: grab;
        }
        .draggable-wrapper:active {
            cursor: grabbing;
        }

        /* Yüklenen resimlerin 1:1 formatı ve yuvarlaklığı */
        .draggable-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.5rem;
            user-select: none;
            -webkit-user-drag: none; 
            pointer-events: none; /* Tıklamaları ana kapsayıcıya devret */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            background-color: #1e222a;
        }
        
        @media (max-width: 640px) {
            .draggable-wrapper {
                width: 48px !important;
                height: 48px !important;
                min-width: 48px !important;
                min-height: 48px !important;
            }
        }

        /* Havuz ve Tier bölümleri için min yükseklik */
        .drop-zone-content {
            min-height: 72px;
        }
    </style>
</head>

    <script>
        // --- UYGULAMA DURUMU (STATE) ---
        let state = {
            tiers: [
                { id: 't1', name: 'S', color: '#ff6b81' },
                { id: 't2', name: 'A', color: '#ff9f43' },
                { id: 't3', name: 'B', color: '#feca57' },
                { id: 't4', name: 'C', color: '#1dd1a1' },
                { id: 't5', name: 'D', color: '#48dbfb' }
            ],
            images: []
        };

        // Resim Silme Fonksiyonu
        function deleteImage(id) {
            state.images = state.images.filter(img => img.id !== id);
            renderAll();
        }

        // Dışarıya tıklanınca çarpı (X) butonlarını gizleme
        document.addEventListener('mousedown', hideDeleteButtons);
        document.addEventListener('touchstart', hideDeleteButtons, { passive: true });
        
        function hideDeleteButtons(e) {
            if (!e.target.closest('.draggable-wrapper')) {
                document.querySelectorAll('.delete-btn').forEach(btn => btn.classList.add('opacity-0', 'pointer-events-none'));
            }
        }

        // --- RENDER İŞLEMLERİ ---
        function renderAll() {
            const tierListEl = document.getElementById('tierList');
            const poolEl = document.getElementById('imagePool');
            
            // Tabloyu Temizle
            tierListEl.innerHTML = '';
            poolEl.innerHTML = '';

            // Katmanları (Tiers) Oluştur
            state.tiers.forEach((tier, index) => {
                const isLast = index === state.tiers.length - 1;
                const borderClass = isLast ? '' : 'border-b border-[#0f1115]';

                const row = document.createElement('div');
                row.className = `flex min-h-[72px] bg-[#1e222a] ${borderClass} group`;
                row.setAttribute('data-tier-id', tier.id);

                row.innerHTML = `
                    <div class="w-20 sm:w-24 flex-shrink-0 flex items-center justify-center p-1 sm:p-2 tier-label-container overflow-hidden" 
                         style="background-color: ${tier.color}; border-right: 2px solid #0f1115;">
                        <span class="font-bold tier-label text-center break-words leading-tight inline-block" style="font-size: 24px;">${tier.name}</span>
                    </div>
                    <div class="flex-1 p-2 flex flex-wrap gap-2 items-start content-start drop-zone-content"></div>
                `;
                tierListEl.appendChild(row);
            });

            // Resimleri Yerleştir
            state.images.forEach(imgData => {
                // Ana Kapsayıcı
                const wrapper = document.createElement('div');
                wrapper.className = 'draggable-wrapper relative group';
                wrapper.setAttribute('data-img-id', imgData.id);

                // Resim Kendisi
                const imgEl = document.createElement('img');
                imgEl.src = imgData.src;
                imgEl.className = 'draggable-item';
                
                // Silme (X) Butonu
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn absolute -top-2 -right-2 bg-red-600 hover:bg-red-500 text-white rounded-full p-1 opacity-0 pointer-events-none transition-opacity z-10 w-6 h-6 flex items-center justify-center shadow-lg';
                delBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
                delBtn.onclick = (e) => {
                    e.stopPropagation(); // Tıklamanın alt tabakaya geçmesini engeller
                    deleteImage(imgData.id);
                };

                wrapper.appendChild(imgEl);
                wrapper.appendChild(delBtn);
                
                // Sürükleme Olayları (Mouse & Touch) - Artık kapsayıcıya bağlı
                wrapper.addEventListener('mousedown', startDrag);
                wrapper.addEventListener('touchstart', startDrag, { passive: false });

                if (imgData.tierId === 'pool') {
                    poolEl.appendChild(wrapper);
                } else {
                    const targetTier = document.querySelector(`div[data-tier-id="${imgData.tierId}"] .drop-zone-content`);
                    if (targetTier) {
                        targetTier.appendChild(wrapper);
                    } else {
                        imgData.tierId = 'pool';
                        poolEl.appendChild(wrapper);
                    }
                }
            });

            // Resimler ve katmanlar çizildikten sonra yazı boyutlarını otomatik ayarla
            adjustTierLabelSizes();
        }

        // --- YAZI BOYUTUNU OTOMATİK KÜÇÜLTME MANTIĞI ---
        function adjustTierLabelSizes() {
            const containers = document.querySelectorAll('.tier-label-container');
            containers.forEach(container => {
                const span = container.querySelector('.tier-label');
                
                // Önce yazıyı varsayılan en büyük boyuta (24px) çekiyoruz
                span.style.fontSize = '24px';
                
                let fontSize = 24;
                const minFontSize = 10; // Okunabilecek minimum piksel boyutu
                
                // Kutunun güvenli iç boşluğunu (padding) hesaplıyoruz
                const paddingX = parseInt(window.getComputedStyle(container).paddingLeft) + parseInt(window.getComputedStyle(container).paddingRight);
                const paddingY = parseInt(window.getComputedStyle(container).paddingTop) + parseInt(window.getComputedStyle(container).paddingBottom);
                
                const maxWidth = container.clientWidth - paddingX;
                const maxHeight = container.clientHeight - paddingY;

                // Eğer yazı kutunun genişliğini veya yüksekliğini aşıyorsa, sığana kadar 1 piksel küçültüyoruz
                while ((span.offsetWidth > maxWidth || span.offsetHeight > maxHeight) && fontSize > minFontSize) {
                    fontSize--;
                    span.style.fontSize = fontSize + 'px';
                }
            });
        }

        // Ekran boyutu değiştiğinde de otomatik ayarı tetikle
        window.addEventListener('resize', adjustTierLabelSizes);

        // --- SÜRÜKLE VE BIRAK MANTIĞI ---
        let dragState = null;

        function startDrag(e) {
            if (e.type === 'mousedown' && e.button !== 0) return;
            if (e.target.closest('.delete-btn')) return; // Çarpı butonuna basıldıysa sürüklemeyi başlatma

            const target = e.currentTarget;
            const id = target.getAttribute('data-img-id');
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

            dragState = {
                id: id,
                element: target,
                startX: clientX,
                startY: clientY,
                isDragging: false,
                clone: null
            };

            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function dragMove(e) {
            if (!dragState) return;

            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

            // Farenin ufak titremelerini sürükleme sanmaması için 3px tolerans
            if (!dragState.isDragging) {
                const dx = clientX - dragState.startX;
                const dy = clientY - dragState.startY;
                
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                    dragState.isDragging = true;
                    
                    // Sürükleme Kesinleşti, Klonu oluştur
                    const rect = dragState.element.getBoundingClientRect();
                    const clone = dragState.element.cloneNode(true);
                    
                    // Klondaki Çarpıyı Gizle
                    const cloneDel = clone.querySelector('.delete-btn');
                    if(cloneDel) cloneDel.remove();

                    clone.style.position = 'fixed';
                    clone.style.left = `${rect.left}px`;
                    clone.style.top = `${rect.top}px`;
                    clone.style.width = `${rect.width}px`;
                    clone.style.height = `${rect.height}px`;
                    clone.style.pointerEvents = 'none'; 
                    clone.style.zIndex = '9999';
                    clone.style.margin = '0';
                    clone.style.opacity = '0.9';
                    clone.style.boxShadow = '0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3)';
                    clone.style.transform = 'scale(1.05)';
                    clone.style.transition = 'transform 0.1s ease';
                    
                    document.body.appendChild(clone);
                    dragState.clone = clone;
                    dragState.offsetX = clientX - rect.left;
                    dragState.offsetY = clientY - rect.top;

                    // Orijinali gizle 
                    dragState.element.style.opacity = '0';
                    
                    // Varsa açık olan çarpı butonlarını gizle
                    document.querySelectorAll('.delete-btn').forEach(b => b.classList.add('opacity-0', 'pointer-events-none'));
                }
            }

            if (dragState.isDragging) {
                e.preventDefault(); 
                dragState.clone.style.left = `${clientX - dragState.offsetX}px`;
                dragState.clone.style.top = `${clientY - dragState.offsetY}px`;
            }
        }

        function endDrag(e) {
            if (!dragState) return;

            if (!dragState.isDragging) {
                // EĞER SÜRÜKLENMEDİYSE BU BİR TIKLAMADIR! (Çarpı ikonunu göster/gizle)
                const delBtn = dragState.element.querySelector('.delete-btn');
                const isHidden = delBtn.classList.contains('opacity-0');
                
                // Diğer tüm çarpıları gizle
                document.querySelectorAll('.delete-btn').forEach(b => b.classList.add('opacity-0', 'pointer-events-none'));
                
                if (isHidden) {
                    delBtn.classList.remove('opacity-0', 'pointer-events-none');
                }
            } else {
                // SÜRÜKLEME İŞLEMİ BİTTİ, BIRAKILIYOR
                const clientX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;

                const targetEl = document.elementFromPoint(clientX, clientY);
                const dropZone = targetEl ? targetEl.closest('[data-tier-id]') : null;

                if (dropZone) {
                    const newTierId = dropZone.getAttribute('data-tier-id');
                    let dropContent = dropZone.classList.contains('drop-zone-content') ? dropZone : dropZone.querySelector('.drop-zone-content');
                    if (!dropContent && dropZone.id === 'imagePool') dropContent = dropZone;

                    const siblings = [...dropContent.querySelectorAll('.draggable-wrapper')]
                                        .filter(el => el.getAttribute('data-img-id') !== dragState.id);
                    
                    let nextSibling = siblings.find(sibling => {
                        const box = sibling.getBoundingClientRect();
                        if (clientY < box.top) return true; 
                        if (clientY > box.bottom) return false; 
                        return clientX < box.left + box.width / 2;
                    });

                    const imgIndex = state.images.findIndex(img => img.id === dragState.id);
                    if (imgIndex > -1) {
                        const imgData = state.images.splice(imgIndex, 1)[0]; 
                        imgData.tierId = newTierId; 
                        
                        if (nextSibling) {
                            const nextId = nextSibling.getAttribute('data-img-id');
                            const insertIndex = state.images.findIndex(img => img.id === nextId);
                            state.images.splice(insertIndex, 0, imgData);
                            dropContent.insertBefore(dragState.element, nextSibling);
                        } else {
                            state.images.push(imgData);
                            dropContent.appendChild(dragState.element);
                        }
                    }

                    spawnParticles(clientX, clientY);
                }
            }

            // Temizlik
            if (dragState.clone) dragState.clone.remove();
            if (dragState.element) dragState.element.style.opacity = '1';
            
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('touchmove', dragMove);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);

            dragState = null;
        }

        // --- PARTİKÜL ANİMASYONU ---
        function spawnParticles(x, y) {
            const colors = ['#ffffff', '#fbbf24', '#60a5fa', '#34d399', '#f87171'];
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'fixed w-2 h-2 rounded-full pointer-events-none z-[10000]';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                document.body.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 40 + Math.random() * 80;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 400 + Math.random() * 300,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
                }).onfinish = () => particle.remove();
            }
        }

        // --- DOSYA YÜKLEME ---
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                if (!file.type.startsWith('image/')) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const newImage = {
                        id: 'img_' + Date.now() + Math.random().toString(36).substr(2, 9),
                        src: event.target.result,
                        tierId: 'pool'
                    };
                    state.images.push(newImage);
                    renderAll();
                };
                reader.readAsDataURL(file);
            });
            
            this.value = '';
        });

        // --- AYARLAR MODALI İŞLEMLERİ ---
        function openModal() {
            const modal = document.getElementById('settingsModal');
            const modalContent = document.getElementById('modalContent');
            const listEl = document.getElementById('modalTierList');
            
            listEl.innerHTML = '';
            
            state.tiers.forEach((tier) => {
                listEl.appendChild(createTierEditRow(tier));
            });

            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            });
        }

        function closeModal() {
            const modal = document.getElementById('settingsModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        function createTierEditRow(tier) {
            const mediumColors = ['#ff6b81', '#ff9f43', '#feca57', '#1dd1a1', '#48dbfb', '#5f27cd', '#ff9ff3', '#c8d6e5'];
            const div = document.createElement('div');
            div.className = 'flex items-center gap-3 mb-3 bg-[#13151a] p-2 rounded-xl border border-gray-800 tier-edit-row';
            div.setAttribute('data-id', tier.id || ('new_' + Date.now()));
            
            div.innerHTML = `
                <div class="flex flex-col gap-1 items-center justify-center pr-3 border-r border-gray-700">
                    <button onclick="moveTierUp(this)" class="text-gray-500 hover:text-white p-1 hover:bg-gray-700 rounded transition-colors" title="Yukarı Taşı">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                    </button>
                    <button onclick="moveTierDown(this)" class="text-gray-500 hover:text-white p-1 hover:bg-gray-700 rounded transition-colors" title="Aşağı Taşı">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>
                
                <div class="flex-1 flex flex-col gap-3 pl-2 py-1">
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col gap-1 items-center" title="Tüm Renk Paletini Aç (Açıklık ve Doygunluk Ayarı)">
                            <div class="relative w-10 h-10 flex-shrink-0 cursor-pointer overflow-hidden rounded border border-gray-600 shadow-inner hover:border-gray-400 transition-colors">
                                <input type="color" class="absolute -top-2 -left-2 w-14 h-14 cursor-pointer color-input" value="${tier.color}">
                            </div>
                        </div>
                        
                        <input type="text" class="flex-1 bg-transparent border-none text-white font-medium text-lg focus:outline-none focus:ring-0 name-input px-2 placeholder-gray-600" value="${tier.name}" placeholder="Katman Adı">
                        
                        <button onclick="this.closest('.tier-edit-row').remove()" class="p-2 text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-lg transition-colors" title="Sil">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 items-center px-1 mt-1">
                        <span class="text-[11px] text-gray-500 font-medium uppercase tracking-wider mr-1">Hazır Renkler:</span>
                        ${mediumColors.map(c => `<button type="button" class="w-6 h-6 rounded-full hover:scale-125 transition-transform shadow-md border border-gray-700" style="background-color: ${c}" onclick="setSwatchColor(this, '${c}')" title="${c}"></button>`).join('')}
                    </div>
                </div>
            `;
            return div;
        }

        function setSwatchColor(btn, color) {
            const row = btn.closest('.tier-edit-row');
            const colorInput = row.querySelector('.color-input');
            colorInput.value = color;
        }

        function moveTierUp(btn) {
            const row = btn.closest('.tier-edit-row');
            if (row.previousElementSibling) {
                row.parentNode.insertBefore(row, row.previousElementSibling);
            }
        }

        function moveTierDown(btn) {
            const row = btn.closest('.tier-edit-row');
            if (row.nextElementSibling) {
                row.parentNode.insertBefore(row.nextElementSibling, row);
            }
        }

        function addTierRow() {
            const listEl = document.getElementById('modalTierList');
            const mediumColors = ['#ff6b81', '#ff9f43', '#feca57', '#1dd1a1', '#48dbfb', '#5f27cd', '#ff9ff3', '#c8d6e5'];
            const randomColor = mediumColors[Math.floor(Math.random() * mediumColors.length)];
            
            listEl.appendChild(createTierEditRow({ name: 'Yeni', color: randomColor }));
            
            listEl.scrollTop = listEl.scrollHeight;
        }

        function saveSettings() {
            const rows = document.querySelectorAll('.tier-edit-row');
            const newTiers = [];
            
            rows.forEach(row => {
                const id = row.getAttribute('data-id');
                const color = row.querySelector('.color-input').value;
                const name = row.querySelector('.name-input').value || 'İsimsiz';
                
                newTiers.push({ id, name, color });
            });

            if (newTiers.length === 0) {
                alert("En az bir katman olmalıdır!");
                return;
            }

            state.tiers = newTiers;
            renderAll();
            closeModal();
        }

        // --- PNG OLARAK İNDİRME ---
        async function exportPNG() {
            // İndirme anında ekrandaki imleç/seçim görünmesin diye odaklanmayı kaldırıyoruz
            if (document.activeElement) {
                document.activeElement.blur();
            }

            const container = document.getElementById('export-container');
            const originalBorder = container.style.border;
            const originalWidth = container.style.width;
            
            container.style.border = 'none';
            
            // Yerleşimin bozulmaması için piksel cinsinden genişliği donduruyoruz
            const rect = container.getBoundingClientRect();
            container.style.width = rect.width + 'px';
            container.style.maxWidth = rect.width + 'px';

            try {
                // Sayfanın birebir ekran görüntüsünü alan motor.
                const dataUrl = await htmlToImage.toPng(container, {
                    backgroundColor: '#0f1115', 
                    pixelRatio: 2, // 2x Yüksek kalite fotoğraf
                    style: { margin: '0' }
                });

                const link = document.createElement('a');
                link.download = 'tier-listesi.png';
                link.href = dataUrl;
                link.click();
            } catch (err) {
                console.error("PNG dışa aktarma hatası:", err);
                alert("Resim indirilirken bir sorun oluştu.");
            } finally {
                // Temizlik
                container.style.border = originalBorder;
                container.style.width = originalWidth;
                container.style.maxWidth = ''; // Max-width'i temizle
            }
        }

        // --- YAZI RESMİ OLUŞTURMA (1:1) MANTIĞI ---
        const customTextInput = document.getElementById('customTextInput');
        const customTextSize = document.getElementById('customTextSize');
        const customTextBg = document.getElementById('customTextBg');
        const textPreviewSpan = document.getElementById('textPreviewSpan');
        const textPreviewBox = document.getElementById('textPreviewBox');

        if (customTextInput) {
            customTextInput.addEventListener('input', (e) => {
                textPreviewSpan.innerText = e.target.value || 'Yazı';
            });
            customTextSize.addEventListener('input', (e) => {
                textPreviewSpan.style.fontSize = `${e.target.value}px`;
            });
            customTextBg.addEventListener('input', (e) => {
                textPreviewBox.style.backgroundColor = e.target.value;
            });
        }

        function openTextModal() {
            const modal = document.getElementById('textModal');
            const modalContent = document.getElementById('textModalContent');
            
            // Değerleri Sıfırla
            customTextInput.value = '';
            textPreviewSpan.innerText = 'Yazı';
            customTextSize.value = '32';
            textPreviewSpan.style.fontSize = '32px';
            customTextBg.value = '#2563eb';
            textPreviewBox.style.backgroundColor = '#2563eb';

            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            });
        }

        function closeTextModal() {
            const modal = document.getElementById('textModal');
            const modalContent = document.getElementById('textModalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        async function generateTextImage() {
            try {
                const dataUrl = await htmlToImage.toPng(textPreviewBox, {
                    pixelRatio: 4, // Keskin görünüm için 4 kat oran
                    style: { margin: '0' }
                });

                const newImage = {
                    id: 'textimg_' + Date.now() + Math.random().toString(36).substr(2, 9),
                    src: dataUrl,
                    tierId: 'pool'
                };
                
                state.images.push(newImage);
                renderAll();
                closeTextModal();
            } catch (err) {
                console.error("Yazı resmi oluşturma hatası:", err);
                alert("Resim oluşturulurken bir hata oluştu.");
            }
        }

        // --- BAŞLANGIÇ ---
        renderAll();

    </script>
</body>
</html>
