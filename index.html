<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katman Listesi Oluşturucu</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Satoshi Font -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <!-- html2canvas for PNG Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Satoshi', sans-serif;
            background-color: #0f1115; /* Koyu tema arka planı */
            color: #ffffff;
            overflow-x: hidden;
            overscroll-behavior-y: none; /* Mobilde aşağı çekerek yenilemeyi engeller */
        }
        
        /* Renklerin canlı kalması için ayarlandı */
        .tier-label {
            color: #000000;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.3);
        }

        /* Özel Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Input type color özelleştirmesi */
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 0.5rem;
        }

        /* Yüklenen resimlerin 1:1 formatı ve yuvarlaklığı */
        .draggable-item {
            width: 80px !important;
            height: 80px !important;
            min-width: 80px !important;
            min-height: 80px !important;
            border-radius: 0.75rem; /* Yuvarlak köşeler */
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none; /* Tarayıcının kendi sürüklemesini engelle */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
            flex-shrink: 0; /* CRITICAL: Resimlerin boyutunun sıkışmasını tamamen engeller */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1e222a; /* Resim yüklenirken arka plan */
        }
        
        @media (max-width: 640px) {
            .draggable-item {
                width: 64px !important;
                height: 64px !important;
                min-width: 64px !important;
                min-height: 64px !important;
            }
        }

        .draggable-item:active {
            cursor: grabbing;
        }

        /* Havuz ve Tier bölümleri için min yükseklik */
        .drop-zone-content {
            min-height: 96px;
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 flex flex-col">

    <!-- Üst Kontrol Çubuğu -->
    <header class="max-w-5xl mx-auto w-full flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
        <!-- Düzenlenebilir Başlık -->
        <h1 id="main-title" contenteditable="true" spellcheck="false" class="text-3xl sm:text-4xl font-black tracking-wide text-white focus:outline-none hover:bg-[#1e222a] focus:bg-[#1e222a] px-4 py-2 rounded-xl transition-all border-2 border-dashed border-transparent focus:border-gray-600" title="Listeyi adlandırmak için tıklayın">Benim Katman Listem</h1>
        
        <div class="flex items-center gap-3 flex-wrap justify-center">
            <!-- Dosya Yükleme -->
            <label class="cursor-pointer bg-blue-600 hover:bg-blue-500 transition-colors px-4 py-2 rounded-xl flex items-center gap-2 font-semibold shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Resim Yükle
                <input type="file" id="imageInput" accept="image/*" multiple class="hidden">
            </label>

            <!-- Listeyi Düzenle Butonu -->
            <button onclick="openModal()" class="bg-gray-700 hover:bg-gray-600 transition-colors px-4 py-2 rounded-xl flex items-center gap-2 font-semibold shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                Düzenle
            </button>

            <!-- PNG İndir -->
            <button onclick="exportPNG()" class="bg-green-600 hover:bg-green-500 transition-colors px-4 py-2 rounded-xl flex items-center gap-2 font-semibold shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                İndir
            </button>
        </div>
    </header>

    <!-- Ana İçerik Alanı -->
    <main class="max-w-5xl mx-auto w-full flex-1 flex flex-col gap-8">
        
        <!-- İndirilecek Ana Tablo Kapsayıcısı -->
        <div id="export-container" class="bg-[#1a1d24] rounded-2xl p-4 sm:p-6 shadow-2xl border border-gray-800 flex flex-col gap-6">
            
            <!-- Tier Listesi -->
            <div id="tierList" class="flex flex-col rounded-xl overflow-hidden border border-gray-800 shadow-inner">
                <!-- JavaScript ile Doldurulacak -->
            </div>
        </div>

        <!-- Fotoğraf Havuzu -->
        <div class="mt-4">
            <div id="imagePool" data-tier-id="pool" class="bg-[#1a1d24] border-2 border-dashed border-gray-700 rounded-2xl p-4 drop-zone-content flex flex-wrap gap-3 items-start justify-start shadow-inner min-h-[120px]">
                <!-- Yüklenen resimler buraya gelecek -->
            </div>
        </div>

    </main>

    <!-- Ayarlar Modalı -->
    <div id="settingsModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="bg-[#1a1d24] border border-gray-700 rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200" id="modalContent">
            
            <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#1e222a]">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    Katmanları Düzenle
                </h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors bg-gray-800 hover:bg-gray-700 p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="p-6 max-h-[60vh] overflow-y-auto" id="modalTierList">
                <!-- Modal İçeriği JavaScript ile eklenecek -->
            </div>

            <div class="p-6 border-t border-gray-800 bg-[#1e222a] flex justify-between items-center">
                <button onclick="addTierRow()" class="text-blue-400 hover:text-blue-300 font-semibold flex items-center gap-1 transition-colors px-3 py-2 rounded-lg hover:bg-blue-500/10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Katman Ekle
                </button>
                
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl font-bold text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">İptal</button>
                    <button onclick="saveSettings()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold shadow-lg shadow-blue-900/50 transition-all active:scale-95">Kaydet</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- UYGULAMA DURUMU (STATE) ---
        let state = {
            tiers: [
                { id: 't1', name: 'S', color: '#ff6b81' },
                { id: 't2', name: 'A', color: '#ff9f43' },
                { id: 't3', name: 'B', color: '#feca57' },
                { id: 't4', name: 'C', color: '#1dd1a1' },
                { id: 't5', name: 'D', color: '#48dbfb' }
            ],
            images: [] // { id: 'img1', src: '...', tierId: 't1' | 'pool' }
        };

        // --- RENDER İŞLEMLERİ ---
        function renderAll() {
            const tierListEl = document.getElementById('tierList');
            const poolEl = document.getElementById('imagePool');
            
            // Tabloyu Temizle
            tierListEl.innerHTML = '';
            poolEl.innerHTML = '';

            // Katmanları (Tiers) Oluştur
            state.tiers.forEach((tier, index) => {
                const isLast = index === state.tiers.length - 1;
                const borderClass = isLast ? '' : 'border-b border-[#0f1115]';

                const row = document.createElement('div');
                row.className = `flex min-h-[96px] bg-[#1e222a] ${borderClass} group`;
                row.setAttribute('data-tier-id', tier.id);

                row.innerHTML = `
                    <div class="w-24 sm:w-32 flex-shrink-0 relative" 
                         style="background-color: ${tier.color}; border-right: 2px solid #0f1115;">
                        <div class="absolute inset-0 flex items-center justify-center p-2">
                            <span class="font-black text-2xl sm:text-3xl tier-label text-center break-words">${tier.name}</span>
                        </div>
                    </div>
                    <div class="flex-1 p-3 flex flex-wrap gap-3 items-start content-start drop-zone-content"></div>
                `;
                tierListEl.appendChild(row);
            });

            // Resimleri Yerleştir
            state.images.forEach(imgData => {
                const imgEl = document.createElement('div'); // img yerine div kullanıyoruz (html2canvas orantı koruması için)
                imgEl.style.backgroundImage = `url('${imgData.src}')`;
                imgEl.className = 'draggable-item';
                imgEl.setAttribute('data-img-id', imgData.id);
                
                // Sürükleme Olayları (Mouse & Touch)
                imgEl.addEventListener('mousedown', startDrag);
                imgEl.addEventListener('touchstart', startDrag, { passive: false });

                if (imgData.tierId === 'pool') {
                    poolEl.appendChild(imgEl);
                } else {
                    const targetTier = document.querySelector(`div[data-tier-id="${imgData.tierId}"] .drop-zone-content`);
                    if (targetTier) {
                        targetTier.appendChild(imgEl);
                    } else {
                        // Eğer tier silinmişse havuza at
                        imgData.tierId = 'pool';
                        poolEl.appendChild(imgEl);
                    }
                }
            });
        }

        // --- SÜRÜKLE VE BIRAK MANTIĞI ---
        let dragState = null;

        function startDrag(e) {
            e.preventDefault(); 
            
            if (e.type === 'mousedown' && e.button !== 0) return;

            const target = e.target;
            const id = target.getAttribute('data-img-id');
            const rect = target.getBoundingClientRect();
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

            // Klon oluştur (İmleci takip edecek element)
            const clone = target.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.left = `${rect.left}px`;
            clone.style.top = `${rect.top}px`;
            clone.style.width = `${rect.width}px`;
            clone.style.height = `${rect.height}px`;
            clone.style.pointerEvents = 'none'; 
            clone.style.zIndex = '9999';
            clone.style.margin = '0';
            clone.style.opacity = '0.9';
            clone.style.boxShadow = '0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3)';
            clone.style.transform = 'scale(1.05)';
            clone.style.transition = 'transform 0.1s ease';
            
            document.body.appendChild(clone);

            // Orijinali gizle (boşluk efekti için)
            target.style.opacity = '0';

            dragState = {
                id: id,
                element: target,
                clone: clone,
                offsetX: clientX - rect.left,
                offsetY: clientY - rect.top
            };

            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function dragMove(e) {
            if (!dragState) return;
            e.preventDefault(); 

            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

            dragState.clone.style.left = `${clientX - dragState.offsetX}px`;
            dragState.clone.style.top = `${clientY - dragState.offsetY}px`;
        }

        function endDrag(e) {
            if (!dragState) return;

            const clientX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;

            // Bırakılan yerdeki elementi bul
            const targetEl = document.elementFromPoint(clientX, clientY);
            
            // Yukarı doğru en yakın tier veya havuzu bul
            const dropZone = targetEl ? targetEl.closest('[data-tier-id]') : null;

            if (dropZone) {
                const newTierId = dropZone.getAttribute('data-tier-id');
                
                // Bırakılan kutunun asıl içerik alanını bul
                let dropContent = dropZone.classList.contains('drop-zone-content') ? dropZone : dropZone.querySelector('.drop-zone-content');
                if (!dropContent && dropZone.id === 'imagePool') dropContent = dropZone;

                // Kendi dışındaki tüm diğer resimleri al
                const siblings = [...dropContent.querySelectorAll('.draggable-item')]
                                    .filter(el => el.getAttribute('data-img-id') !== dragState.id);
                
                // Farenin imleci hangi resmin önüne düştüyse onu bul
                let nextSibling = siblings.find(sibling => {
                    const box = sibling.getBoundingClientRect();
                    // Satır mantığı (Flex-wrap hesaplaması)
                    if (clientY < box.top) return true; // İmleç üst satırda
                    if (clientY > box.bottom) return false; // İmleç alt satırda
                    // İmleç aynı satırda ise ortasından öncesi mi diye bak
                    return clientX < box.left + box.width / 2;
                });

                // State array'ini güncelle (Sıralamayı Değiştir)
                const imgIndex = state.images.findIndex(img => img.id === dragState.id);
                if (imgIndex > -1) {
                    const imgData = state.images.splice(imgIndex, 1)[0]; // Mevcut konumdan çıkar
                    imgData.tierId = newTierId; // Yeni veya aynı tier kimliğini ata
                    
                    if (nextSibling) {
                        // Eğer imlecin önünde durduğu bir resim varsa, onun indexine (önüne) ekle
                        const nextId = nextSibling.getAttribute('data-img-id');
                        const insertIndex = state.images.findIndex(img => img.id === nextId);
                        state.images.splice(insertIndex, 0, imgData);
                    } else {
                        // Önünde resim yoksa (en sona bırakıldıysa) sonuna ekle
                        state.images.push(imgData);
                    }
                }

                // Partikül efekti
                spawnParticles(clientX, clientY);
            }

            // Temizlik
            dragState.clone.remove();
            dragState.element.style.opacity = '1';
            
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('touchmove', dragMove);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);

            dragState = null;
            
            // Sıralanmış yeni array'e göre ekranı tamamen yenile
            renderAll();
        }

        // --- PARTİKÜL ANİMASYONU ---
        function spawnParticles(x, y) {
            const colors = ['#ffffff', '#fbbf24', '#60a5fa', '#34d399', '#f87171'];
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'fixed w-2 h-2 rounded-full pointer-events-none z-[10000]';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                document.body.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 40 + Math.random() * 80;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 400 + Math.random() * 300,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
                }).onfinish = () => particle.remove();
            }
        }

        // --- DOSYA YÜKLEME ---
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                if (!file.type.startsWith('image/')) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const newImage = {
                        id: 'img_' + Date.now() + Math.random().toString(36).substr(2, 9),
                        src: event.target.result,
                        tierId: 'pool'
                    };
                    state.images.push(newImage);
                    renderAll();
                };
                reader.readAsDataURL(file);
            });
            
            this.value = '';
        });

        // --- AYARLAR MODALI İŞLEMLERİ ---
        function openModal() {
            const modal = document.getElementById('settingsModal');
            const modalContent = document.getElementById('modalContent');
            const listEl = document.getElementById('modalTierList');
            
            listEl.innerHTML = '';
            
            state.tiers.forEach((tier) => {
                listEl.appendChild(createTierEditRow(tier));
            });

            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            });
        }

        function closeModal() {
            const modal = document.getElementById('settingsModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        function createTierEditRow(tier) {
            const mediumColors = ['#ff6b81', '#ff9f43', '#feca57', '#1dd1a1', '#48dbfb', '#5f27cd', '#ff9ff3', '#c8d6e5'];
            const div = document.createElement('div');
            div.className = 'flex items-center gap-3 mb-3 bg-[#13151a] p-2 rounded-xl border border-gray-800 tier-edit-row';
            div.setAttribute('data-id', tier.id || ('new_' + Date.now()));
            
            div.innerHTML = `
                <div class="flex flex-col gap-1 items-center justify-center pr-3 border-r border-gray-700">
                    <button onclick="moveTierUp(this)" class="text-gray-500 hover:text-white p-1 hover:bg-gray-700 rounded transition-colors" title="Yukarı Taşı">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                    </button>
                    <button onclick="moveTierDown(this)" class="text-gray-500 hover:text-white p-1 hover:bg-gray-700 rounded transition-colors" title="Aşağı Taşı">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>
                
                <div class="flex-1 flex flex-col gap-3 pl-2 py-1">
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col gap-1 items-center" title="Tüm Renk Paletini Aç (Açıklık ve Doygunluk Ayarı)">
                            <div class="relative w-10 h-10 flex-shrink-0 cursor-pointer overflow-hidden rounded border border-gray-600 shadow-inner hover:border-gray-400 transition-colors">
                                <input type="color" class="absolute -top-2 -left-2 w-14 h-14 cursor-pointer color-input" value="${tier.color}">
                            </div>
                        </div>
                        
                        <input type="text" class="flex-1 bg-transparent border-none text-white font-bold text-lg focus:outline-none focus:ring-0 name-input px-2 placeholder-gray-600" value="${tier.name}" placeholder="Katman Adı">
                        
                        <button onclick="this.closest('.tier-edit-row').remove()" class="p-2 text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-lg transition-colors" title="Sil">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 items-center px-1 mt-1">
                        <span class="text-[11px] text-gray-500 font-bold uppercase tracking-wider mr-1">Hazır Renkler:</span>
                        ${mediumColors.map(c => `<button type="button" class="w-6 h-6 rounded-full hover:scale-125 transition-transform shadow-md border border-gray-700" style="background-color: ${c}" onclick="setSwatchColor(this, '${c}')" title="${c}"></button>`).join('')}
                    </div>
                </div>
            `;
            return div;
        }

        function setSwatchColor(btn, color) {
            const row = btn.closest('.tier-edit-row');
            const colorInput = row.querySelector('.color-input');
            colorInput.value = color;
        }

        function moveTierUp(btn) {
            const row = btn.closest('.tier-edit-row');
            if (row.previousElementSibling) {
                row.parentNode.insertBefore(row, row.previousElementSibling);
            }
        }

        function moveTierDown(btn) {
            const row = btn.closest('.tier-edit-row');
            if (row.nextElementSibling) {
                row.parentNode.insertBefore(row.nextElementSibling, row);
            }
        }

        function addTierRow() {
            const listEl = document.getElementById('modalTierList');
            const mediumColors = ['#ff6b81', '#ff9f43', '#feca57', '#1dd1a1', '#48dbfb', '#5f27cd', '#ff9ff3', '#c8d6e5'];
            const randomColor = mediumColors[Math.floor(Math.random() * mediumColors.length)];
            
            listEl.appendChild(createTierEditRow({ name: 'Yeni', color: randomColor }));
            
            listEl.scrollTop = listEl.scrollHeight;
        }

        function saveSettings() {
            const rows = document.querySelectorAll('.tier-edit-row');
            const newTiers = [];
            
            rows.forEach(row => {
                const id = row.getAttribute('data-id');
                const color = row.querySelector('.color-input').value;
                const name = row.querySelector('.name-input').value || 'İsimsiz';
                
                newTiers.push({ id, name, color });
            });

            if (newTiers.length === 0) {
                alert("En az bir katman olmalıdır!");
                return;
            }

            state.tiers = newTiers;
            renderAll();
            closeModal();
        }

        // --- PNG OLARAK İNDİRME ---
        async function exportPNG() {
            // İndirme anında ekrandaki imleç/seçim görünmesin diye odaklanmayı kaldırıyoruz
            if (document.activeElement) {
                document.activeElement.blur();
            }

            const container = document.getElementById('export-container');
            const titleEl = document.getElementById('main-title');
            const originalBorder = container.style.border;
            const originalWidth = container.style.width;
            
            // Başlığı resme dahil etmek için geçici olarak container içine kopyalıyoruz
            const clonedTitle = titleEl.cloneNode(true);
            clonedTitle.className = "text-3xl sm:text-4xl font-black tracking-wide text-white text-center mb-6 w-full break-words";
            clonedTitle.removeAttribute('contenteditable');
            container.insertBefore(clonedTitle, container.firstChild);
            
            container.style.border = 'none';
            
            // Çözüm: İndirmeden hemen önce piksel genişliğini dondurarak yerleşimin sıkışmasını/bozulmasını önleriz
            const rect = container.getBoundingClientRect();
            container.style.width = rect.width + 'px';
            container.style.maxWidth = rect.width + 'px'; // Ekstra güvenlik için

            try {
                const canvas = await html2canvas(container, {
                    backgroundColor: '#0f1115', 
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    width: rect.width, // Canvas genişliğini de senkronize et
                    windowWidth: window.innerWidth // Export edilen ekranın çözünürlüğünü kilitle
                });

                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'tier-listesi.png';
                link.href = image;
                link.click();
            } catch (err) {
                console.error("PNG dışa aktarma hatası:", err);
                alert("Resim indirilirken bir sorun oluştu.");
            } finally {
                // Temizlik
                clonedTitle.remove(); // Geçici başlığı sil
                container.style.border = originalBorder;
                container.style.width = originalWidth;
                container.style.maxWidth = ''; // Max-width'i temizle
            }
        }

        // --- BAŞLANGIÇ ---
        renderAll();

    </script>
</body>
</html>
